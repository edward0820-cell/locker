<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>置物櫃租借管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F6F3;--surface:#FFF;--surface2:#F0EEE8;
  --text:#1A1916;--text2:#6B6962;--text3:#A8A49E;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --yellow:#8A5A00;--yellow-bg:#FEF3CD;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;
  --border:#E5E2DA;--shadow:0 1px 3px rgba(0,0,0,.08);
  --radius:8px;--radius-lg:12px;
}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;width:360px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;}
.login-icon{font-size:48px;color:var(--blue);margin-bottom:16px;}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:6px;}
.login-box p{color:var(--text2);font-size:13px;margin-bottom:24px;}
.login-box input{width:100%;height:40px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px;}
.login-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1);}
.login-btn{width:100%;height:40px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;}
.login-btn:hover{background:#0C447C;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;height:18px;}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.header h1 i{color:var(--blue);font-size:18px;}
.sync-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;}
.sync-dot.ok{background:var(--green);}
.sync-dot.loading{background:#FAC775;animation:pulse 1s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.main{padding:16px 20px;max-width:1400px;}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface2);border-radius:var(--radius);padding:3px;width:fit-content;}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s;border:none;background:none;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
.panel{display:none;} .panel.active{display:block;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;}
.sc .lbl{font-size:11px;color:var(--text3);margin-bottom:4px;}
.sc .val{font-size:22px;font-weight:700;line-height:1;}
.sc .sub{font-size:10px;color:var(--text3);margin-top:3px;}
.sc.g{border-left:3px solid var(--green);} .sc.g .val{color:var(--green);}
.sc.y{border-left:3px solid #D4900E;} .sc.y .val{color:var(--yellow);}
.sc.r{border-left:3px solid var(--red);} .sc.r .val{color:var(--red);}
.sc.b{border-left:3px solid var(--blue);} .sc.b .val{color:var(--blue);}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.toolbar input,.toolbar select{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue);}
.toolbar input{min-width:200px;} .toolbar select{min-width:120px;}
.btn{height:32px;padding:0 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);} .btn.pri:hover{background:#0C447C;}
.btn.sml{height:26px;padding:0 8px;font-size:11px;}
.btn.danger{color:var(--red);} .btn.danger:hover{background:var(--red-bg);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.ml-auto{margin-left:auto;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:780px;}
th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.dr:hover td{background:#F9F8F5;cursor:pointer;}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;}
.bg{background:var(--green-bg);color:var(--green);}
.by{background:var(--yellow-bg);color:var(--yellow);}
.br{background:var(--red-bg);color:var(--red);}
.bb{background:var(--blue-bg);color:var(--blue);}
.bgr{background:var(--gray-bg);color:var(--gray);}
.pg{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--text2);}
.alert-bar{background:var(--yellow-bg);border:1px solid #D4900E;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--yellow);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:440px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h2{font-size:14px;font-weight:700;}
.modal-body{padding:16px 20px;max-height:70vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr{display:flex;flex-direction:column;gap:4px;}
.fr label{font-size:11px;color:var(--text2);font-weight:500;}
.fr input,.fr select,.fr textarea{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1);}
.fr textarea{height:64px;padding:8px 10px;resize:vertical;}
.fr.full{grid-column:1/-1;}
.ds{margin-bottom:14px;} .ds-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kv .k{font-size:10px;color:var(--text3);margin-bottom:2px;} .kv .v{font-size:13px;font-weight:500;}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:5px;}
.lc{border-radius:6px;padding:7px 4px;text-align:center;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50px;transition:transform .1s;}
.lc.occ{cursor:pointer;} .lc.occ:hover{transform:scale(1.05);}
.lc .n{font-size:12px;font-weight:700;} .lc .nm{font-size:9px;margin-top:2px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lv{background:var(--green-bg);border-color:#9FE1CB;} .lv .n{color:var(--green);}
.ls_{background:var(--yellow-bg);border-color:#FAC775;} .ls_ .n{color:var(--yellow);}
.le_{background:var(--red-bg);border-color:#F7C1C1;} .le_ .n{color:var(--red);}
.lem{background:var(--surface2);border-color:var(--border);} .lem .n{color:var(--text3);}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text2);align-items:center;margin-bottom:10px;}
.legend span{display:flex;align-items:center;gap:4px;}
.dot{width:10px;height:10px;border-radius:2px;display:inline-block;}
.empty{text-align:center;padding:40px;color:var(--text3);}
.empty i{font-size:32px;display:block;margin-bottom:8px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.wl-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--surface2);font-size:11px;font-weight:700;color:var(--text2);}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-icon"><i class="ti ti-lock"></i></div>
    <h2>置物櫃租借管理系統</h2>
    <p>請輸入密碼以進入系統</p>
    <input id="pw-input" type="password" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-btn" onclick="checkPw()">進入系統</button>
    <div class="login-err" id="pw-err"></div>
  </div>
</div>

<!-- 主系統 -->
<div id="app" style="display:none;">
<header class="header">
  <h1><i class="ti ti-lock"></i>置物櫃租借管理系統</h1>
  <div class="sync-wrap">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text" style="color:var(--text3);font-size:11px;">—</span>
    <button class="btn sml" onclick="loadData()"><i class="ti ti-refresh"></i>重新整理</button>
    <button class="btn sml" onclick="logout()" title="登出"><i class="ti ti-logout"></i></button>
  </div>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('main')"><i class="ti ti-list-details"></i>主表</button>
    <button class="tab" onclick="switchTab('expire')"><i class="ti ti-alert-circle"></i>過期追蹤</button>
    <button class="tab" onclick="switchTab('waitlist')"><i class="ti ti-hourglass"></i>候補名單</button>
    <button class="tab" onclick="switchTab('grid')"><i class="ti ti-layout-grid"></i>更衣室視圖</button>
  </div>

  <!-- MAIN -->
  <div id="tab-main" class="panel active">
    <div class="stats" id="stats-main"></div>
    <div class="toolbar">
      <input id="q-main" type="text" placeholder="🔍 搜尋姓名、會員編號、電話、櫃號..." oninput="renderMain()">
      <select id="f-room" onchange="renderMain()">
        <option value="">全部更衣室</option>
        <option value="男">🔵 男更衣室</option>
        <option value="女">🔴 女更衣室</option>
      </select>
      <select id="f-lk" onchange="renderMain()">
        <option value="">全部狀態</option>
        <option value="有效">🟢 有效</option>
        <option value="即將">🟡 即將到期</option>
        <option value="已過期">🔴 已過期</option>
      </select>
      <select id="f-ms" onchange="renderMain()">
        <option value="">全部會籍</option>
        <option value="開通">🟢 開通中</option>
        <option value="暫停">🔵 暫停中</option>
      </select>
      <button class="btn pri" onclick="openEdit(null)"><i class="ti ti-plus"></i>新增</button>
      <button class="btn ml-auto" onclick="exportCSV()"><i class="ti ti-download"></i>匯出 CSV</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col style="width:32px"><col style="width:50px"><col style="width:76px"><col style="width:100px">
          <col style="width:52px"><col style="width:60px"><col style="width:80px"><col style="width:80px">
          <col style="width:80px"><col style="width:80px"><col style="width:58px"><col style="width:70px">
        </colgroup>
        <thead><tr>
          <th onclick="setSort('room')">室</th>
          <th onclick="setSort('locker')">櫃號</th>
          <th onclick="setSort('name')">姓名</th>
          <th onclick="setSort('id')">會員編號</th>
          <th>方案</th><th>會籍</th>
          <th onclick="setSort('ms2')">會籍起</th>
          <th onclick="setSort('me')">會籍迄</th>
          <th onclick="setSort('ls')">置物起</th>
          <th onclick="setSort('le')">置物迄</th>
          <th>鑰匙</th>
          <th onclick="setSort('lkst')">狀態</th>
        </tr></thead>
        <tbody id="tbody-main"></tbody>
      </table>
    </div>
    <div class="pg" id="pg-main"></div>
  </div>

  <!-- EXPIRE -->
  <div id="tab-expire" class="panel">
    <div class="alert-bar"><i class="ti ti-alert-triangle"></i>置物櫃已過期，需聯繫跟進續繳或退出。今日：<strong id="today-str"></strong></div>
    <div class="toolbar">
      <input id="q-exp" type="text" placeholder="🔍 搜尋..." oninput="renderExpire()">
      <select id="f-exp-room" onchange="renderExpire()">
        <option value="">全部</option><option value="男">🔵 男</option><option value="女">🔴 女</option>
      </select>
      <button class="btn ml-auto" onclick="exportExpireCSV()"><i class="ti ti-download"></i>匯出過期名單</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <colgroup><col style="width:32px"><col style="width:50px"><col style="width:76px"><col style="width:110px"><col style="width:60px"><col style="width:80px"><col style="width:76px"><col style="width:68px"><col></colgroup>
        <thead><tr><th>室</th><th>櫃號</th><th>姓名</th><th>電話</th><th>會籍</th><th>到期日</th><th>過期天數</th><th>鑰匙</th><th>備註</th></tr></thead>
        <tbody id="tbody-exp"></tbody>
      </table>
    </div>
    <div class="pg" id="pg-exp"></div>
  </div>

  <!-- WAITLIST -->
  <div id="tab-waitlist" class="panel">
    <div class="toolbar"><span style="font-size:13px;font-weight:600;">候補名單　共 <span id="wl-count" style="color:var(--blue);"></span> 人等候</span></div>
    <div class="tbl-wrap">
      <table>
        <colgroup><col style="width:44px"><col style="width:120px"><col style="width:80px"><col style="width:80px"><col></colgroup>
        <thead><tr><th>序</th><th>會員編號</th><th>姓名</th><th>會籍狀態</th><th>備註</th></tr></thead>
        <tbody id="tbody-wl"></tbody>
      </table>
    </div>
  </div>

  <!-- GRID -->
  <div id="tab-grid" class="panel">
    <div class="toolbar">
      <select id="g-room" onchange="renderGrid()">
        <option value="男">🔵 男更衣室（1-116）</option>
        <option value="女">🔴 女更衣室（1-80）</option>
      </select>
      <div class="legend">
        <span><span class="dot" style="background:var(--green-bg);border:1px solid #9FE1CB;"></span>有效</span>
        <span><span class="dot" style="background:var(--yellow-bg);border:1px solid #FAC775;"></span>即將到期</span>
        <span><span class="dot" style="background:var(--red-bg);border:1px solid #F7C1C1;"></span>已過期</span>
        <span><span class="dot" style="background:var(--surface2);border:1px solid var(--border);"></span>空置</span>
      </div>
      <span id="grid-summary" class="ml-auto" style="font-size:12px;color:var(--text2);"></span>
    </div>
    <div class="room-grid" id="grid-container"></div>
  </div>
</div>
</div>

<!-- Modal -->
<div id="modal-overlay" style="display:none;" class="modal-overlay" onclick="closeModalBg(event)">
  <div id="modal-box" class="modal" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── 設定區 ────────────────────────────────────────
const API_URL  = 'https://script.google.com/macros/s/AKfycbwn_L8h2xSyeTWLLCFjC4aRZFg5ylLSEnoMa49TXvn7PGIafsmPWZ9t0M5v4bBj6pDrIQ/exec';
const PASSWORD = '123456';
// ─────────────────────────────────────────────────

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
document.getElementById('today-str').textContent = TODAY.toLocaleDateString('zh-TW');

let records = [], waitlist = [];
let sortKey = 'locker', sortAsc = true;
let mainPage = 0, expPage = 0;
const PAGE = 30;

// ── 登入 ──────────────────────────────────────────
function checkPw() {
  const input = document.getElementById('pw-input').value;
  const err   = document.getElementById('pw-err');
  if (input === PASSWORD) {
    sessionStorage.setItem('locker_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    err.textContent = '密碼錯誤，請再試一次';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function logout() {
  sessionStorage.removeItem('locker_auth');
  location.reload();
}

// 若已登入（同一分頁內）直接進入
if (sessionStorage.getItem('locker_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ── 同步狀態 ──────────────────────────────────────
function setSync(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

// ── JSONP 呼叫 ───────────────────────────────────
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[cb] = (data) => { delete window[cb]; document.body.removeChild(script); resolve(data); };
    script.onerror = () => { delete window[cb]; document.body.removeChild(script); reject(new Error('載入失敗')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 載入資料 ──────────────────────────────────────
async function loadData() {
  setSync('loading', '載入中...');
  try {
    const [r1, r2] = await Promise.all([
      jsonp(API_URL + '?action=getAll'),
      jsonp(API_URL + '?action=getWait'),
    ]);
    if (r1.error) throw new Error(r1.error);
    records  = r1.records  || [];
    waitlist = r2.waitlist || [];
    setSync('ok', '已同步 ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}));
    renderMain(); renderExpire(); renderWaitlist();
  } catch(e) {
    setSync('err', '連線失敗');
    alert('無法連接 Google Sheets。\n\n錯誤：' + e.message);
  }
}

// ── API POST（用 fetch no-cors + 重新整理）────────
async function apiPost(payload) {
  setSync('loading', '儲存中...');
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
    setSync('ok', '已儲存 ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}));
    return { ok: true };
  } catch(e) {
    setSync('err', '儲存失敗');
    throw e;
  }
}

// ── Helpers ───────────────────────────────────────
function daysDiff(s) {
  if (!s) return null;
  const d = new Date(s.replace(/\//g, '-'));
  return isNaN(d) ? null : Math.floor((TODAY - d) / 86400000);
}
function lkClass(s) {
  if (!s||s==='—') return 'bgr';
  if (s.includes('有效')) return 'bg';
  if (s.includes('即將')) return 'by';
  if (s.includes('過期')) return 'br';
  return 'bgr';
}
function lkShort(s) {
  if (!s||s==='—') return '無';
  if (s.includes('有效')) return '有效';
  if (s.includes('即將')) return '即將';
  if (s.includes('過期')) return '過期';
  return '未知';
}
function msClass(s) {
  if (!s) return 'bgr';
  if (s.includes('開通')) return 'bg';
  if (s.includes('暫停')) return 'bb';
  return 'br';
}
function msShort(s) {
  if (!s) return '—';
  if (s.includes('開通')) return '開通';
  if (s.includes('暫停')) return '暫停';
  return '⚠️';
}
function keyShort(s) {
  return (s||'').replace('會員不拿','不拿').replace('寄放櫃台','櫃台').replace('已給會員','已給').replace('未記錄','?')||'—';
}
function norm(raw) {
  return {
    _rowIndex: raw._rowIndex,
    id:    raw['會員編號']||'', name:  raw['姓名']||'',
    phone: raw['電話']||'',    plan:  raw['方案']||'',
    ms:    raw['會籍狀態']||'',ms2:   raw['會籍起']||'',
    me:    raw['會籍迄']||'',  room:  raw['更衣室']||'',
    locker:raw['置物櫃號']||'',ls:    raw['置物起']||'',
    le:    raw['置物迄']||'',  lkst:  raw['置物狀態']||'',
    key:   raw['鑰匙狀態']||'',note:  raw['備註']||'',
  };
}
function toSheet(obj) {
  return {
    '會員編號':obj.id,'姓名':obj.name,'電話':obj.phone,'方案':obj.plan,
    '會籍狀態':obj.ms,'會籍起':obj.ms2,'會籍迄':obj.me,
    '更衣室':obj.room,'置物櫃號':obj.locker,
    '置物起':obj.ls,'置物迄':obj.le,'置物狀態':obj.lkst,
    '鑰匙狀態':obj.key,'備註':obj.note,
  };
}

// ── Stats ─────────────────────────────────────────
function updateStats() {
  const recs = records.map(norm);
  const valid = recs.filter(r=>r.lkst.includes('有效')).length;
  const soon  = recs.filter(r=>r.lkst.includes('即將')).length;
  const exp   = recs.filter(r=>r.lkst.includes('過期')).length;
  document.getElementById('stats-main').innerHTML =
    sc('總筆數','b',records.length,'筆') +
    sc('有效','g',valid,'租借中') +
    sc('即將到期','y',soon,'≤30天') +
    sc('已過期','r',exp,'待追蹤');
}
function sc(l,c,v,s){return `<div class="sc ${c}"><div class="lbl">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`;}

// ── Main Table ─────────────────────────────────────
function getFiltered() {
  const q=document.getElementById('q-main').value.toLowerCase().trim();
  const fr=document.getElementById('f-room').value;
  const fl=document.getElementById('f-lk').value;
  const fm=document.getElementById('f-ms').value;
  return records.map(norm).filter(r=>{
    if (q&&!r.name.toLowerCase().includes(q)&&!r.id.toLowerCase().includes(q)&&!r.phone.includes(q)&&!r.locker.includes(q)) return false;
    if (fr&&r.room!==fr) return false;
    if (fl&&!r.lkst.includes(fl)) return false;
    if (fm&&!r.ms.includes(fm)) return false;
    return true;
  });
}
function setSort(k){sortAsc=sortKey===k?!sortAsc:true;sortKey=k;mainPage=0;renderMain();}
function renderMain() {
  updateStats();
  let data=getFiltered();
  data.sort((a,b)=>{
    let av=a[sortKey]||'',bv=b[sortKey]||'';
    if(sortKey==='locker'){av=parseInt(av)||0;bv=parseInt(bv)||0;return sortAsc?(av-bv):(bv-av);}
    return sortAsc?av.localeCompare(bv,'zh-TW'):bv.localeCompare(av,'zh-TW');
  });
  const pages=Math.max(1,Math.ceil(data.length/PAGE));
  if(mainPage>=pages)mainPage=pages-1;
  const slice=data.slice(mainPage*PAGE,(mainPage+1)*PAGE);
  document.getElementById('tbody-main').innerHTML=slice.length?slice.map(r=>`
    <tr class="dr" onclick="openDetail(${r._rowIndex})">
      <td>${r.room||'—'}</td><td><strong>${r.locker||'—'}</strong></td>
      <td title="${r.name}">${r.name}</td>
      <td style="font-size:11px;color:var(--text2);">${r.id}</td>
      <td>${r.plan||'—'}</td>
      <td><span class="badge ${msClass(r.ms)}">${msShort(r.ms)}</span></td>
      <td>${r.ms2||'—'}</td><td>${r.me||'—'}</td><td>${r.ls||'—'}</td>
      <td style="${r.lkst.includes('過期')?'color:var(--red);font-weight:600;':''}">${r.le||'—'}</td>
      <td>${keyShort(r.key)}</td>
      <td><span class="badge ${lkClass(r.lkst)}">${lkShort(r.lkst)}</span></td>
    </tr>`).join('')
  :'<tr><td colspan="12"><div class="empty"><i class="ti ti-search-off"></i>沒有符合的紀錄</div></td></tr>';
  const pg=document.getElementById('pg-main');
  pg.innerHTML=pages>1?`<button class="btn sml" onclick="mainPage=Math.max(0,mainPage-1);renderMain()" ${mainPage===0?'disabled':''}>‹</button><span style="margin:0 6px;">第 ${mainPage+1} / ${pages} 頁（共 ${data.length} 筆）</span><button class="btn sml" onclick="mainPage=Math.min(${pages-1},mainPage+1);renderMain()" ${mainPage===pages-1?'disabled':''}>›</button>`:`<span>共 ${data.length} 筆</span>`;
}

// ── Expire ─────────────────────────────────────────
function renderExpire() {
  const q=document.getElementById('q-exp').value.toLowerCase();
  const fr=document.getElementById('f-exp-room').value;
  let exp=records.map(norm).filter(r=>r.lkst.includes('過期'));
  if(q) exp=exp.filter(r=>r.name.toLowerCase().includes(q)||r.locker.includes(q)||r.phone.includes(q));
  if(fr) exp=exp.filter(r=>r.room===fr);
  exp.sort((a,b)=>(daysDiff(a.le)||0)-(daysDiff(b.le)||0)).reverse();
  const pages=Math.max(1,Math.ceil(exp.length/PAGE));
  if(expPage>=pages)expPage=pages-1;
  const slice=exp.slice(expPage*PAGE,(expPage+1)*PAGE);
  document.getElementById('tbody-exp').innerHTML=slice.map(r=>{
    const d=daysDiff(r.le);
    return `<tr class="dr" onclick="openDetail(${r._rowIndex})">
      <td>${r.room||'—'}</td><td><strong>${r.locker}</strong></td>
      <td>${r.name}</td><td>${r.phone||'—'}</td>
      <td><span class="badge ${msClass(r.ms)}">${msShort(r.ms)}</span></td>
      <td style="color:var(--red);">${r.le}</td>
      <td><strong style="color:var(--red);">${d!==null?d:'?'} 天</strong></td>
      <td>${keyShort(r.key)}</td>
      <td style="font-size:11px;color:var(--text2);" title="${r.note}">${(r.note||'').slice(0,30)||'—'}</td>
    </tr>`;
  }).join('');
  const pg=document.getElementById('pg-exp');
  pg.innerHTML=pages>1?`<button class="btn sml" onclick="expPage=Math.max(0,expPage-1);renderExpire()" ${expPage===0?'disabled':''}>‹</button><span style="margin:0 6px;">第 ${expPage+1}/${pages} 頁（${exp.length} 筆過期）</span><button class="btn sml" onclick="expPage=Math.min(${pages-1},expPage+1);renderExpire()" ${expPage===pages-1?'disabled':''}>›</button>`:`<span>共 ${exp.length} 筆過期</span>`;
}

// ── Waitlist ───────────────────────────────────────
function renderWaitlist() {
  const wl=waitlist.map(w=>({seq:w['序號']||w.seq||'',id:w['會員編號']||w.id||'',name:w['姓名']||w.name||'',status:w['會籍狀態']||w.status||'',note:w['備註']||w.note||''}));
  document.getElementById('wl-count').textContent=wl.length;
  document.getElementById('tbody-wl').innerHTML=wl.map(w=>{
    const sc=w.status.includes('開通')?'bg':w.status.includes('暫停')?'bb':'br';
    return `<tr><td><span class="wl-badge">${w.seq}</span></td><td style="font-size:11px;color:var(--text2);">${w.id}</td><td><strong>${w.name}</strong></td><td><span class="badge ${sc}">${w.status}</span></td><td style="font-size:11px;color:var(--text2);">${w.note||'—'}</td></tr>`;
  }).join('');
}

// ── Grid ───────────────────────────────────────────
function renderGrid() {
  const room=document.getElementById('g-room').value;
  const max=room==='男'?116:80;
  const byLocker={};
  records.map(norm).filter(r=>r.room===room&&r.locker).forEach(r=>{const n=parseInt(r.locker);if(!isNaN(n)&&!byLocker[n])byLocker[n]=r;});
  let valid=0,soon=0,exp=0,empty=0,html='';
  for(let i=1;i<=max;i++){
    const r=byLocker[i];
    let cls='lem',nm='';
    if(r){
      if(r.lkst.includes('有效')){cls='lv';valid++;}
      else if(r.lkst.includes('即將')){cls='ls_';soon++;}
      else if(r.lkst.includes('過期')){cls='le_';exp++;}
      nm=`<div class="nm">${r.name.slice(0,4)}</div>`;
    } else empty++;
    html+=`<div class="lc ${cls} ${r?'occ':''}" title="${r?r.name+'｜'+r.le:i+'號 空置'}" onclick="${r?`openDetail(${r._rowIndex})`:''}">`+`<div class="n">${i}</div>${nm}</div>`;
  }
  document.getElementById('grid-container').innerHTML=html;
  document.getElementById('grid-summary').textContent=`有效 ${valid} ｜ 即將 ${soon} ｜ 過期 ${exp} ｜ 空置 ${empty}`;
}

// ── Detail ─────────────────────────────────────────
function openDetail(rowIndex) {
  const raw=records.find(r=>r._rowIndex===rowIndex);
  if(!raw) return;
  const r=norm(raw);
  const d=daysDiff(r.le);
  const expNote=r.lkst.includes('過期')?`<span style="color:var(--red);font-size:11px;">（已過期 ${d} 天）</span>`:r.lkst.includes('即將')?`<span style="color:var(--yellow);font-size:11px;">（${d!==null?Math.abs(d):'?'} 天後到期）</span>`:'';
  showModal(`
    <div class="modal-head">
      <h2><i class="ti ti-user" style="margin-right:6px;color:var(--blue);"></i>${r.name} — ${r.room||'?'}更衣室 ${r.locker||'?'}號</h2>
      <button class="btn sml" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="ds"><div class="ds-t">會員資訊</div>
        <div class="dg">
          <div class="kv"><div class="k">會員編號</div><div class="v" style="font-size:12px;">${r.id}</div></div>
          <div class="kv"><div class="k">電話</div><div class="v">${r.phone||'—'}</div></div>
          <div class="kv"><div class="k">方案</div><div class="v">${r.plan||'—'}</div></div>
          <div class="kv"><div class="k">會籍狀態</div><div class="v"><span class="badge ${msClass(r.ms)}">${r.ms||'—'}</span></div></div>
          <div class="kv"><div class="k">會籍起</div><div class="v">${r.ms2||'—'}</div></div>
          <div class="kv"><div class="k">會籍迄</div><div class="v">${r.me||'—'}</div></div>
        </div>
      </div>
      <div class="ds"><div class="ds-t">置物櫃資訊</div>
        <div class="dg">
          <div class="kv"><div class="k">更衣室</div><div class="v">${r.room||'—'}</div></div>
          <div class="kv"><div class="k">置物櫃號</div><div class="v"><strong>${r.locker||'—'}</strong></div></div>
          <div class="kv"><div class="k">租借起</div><div class="v">${r.ls||'—'}</div></div>
          <div class="kv"><div class="k">租借迄</div><div class="v">${r.le||'—'} ${expNote}</div></div>
          <div class="kv"><div class="k">狀態</div><div class="v"><span class="badge ${lkClass(r.lkst)}">${r.lkst||'—'}</span></div></div>
          <div class="kv"><div class="k">鑰匙</div><div class="v">${r.key||'—'}</div></div>
        </div>
      </div>
      ${r.note?`<div class="ds"><div class="ds-t">備註</div><div style="font-size:12px;line-height:1.6;color:var(--text2);">${r.note}</div></div>`:''}
    </div>
    <div class="modal-foot">
      <button class="btn danger sml" onclick="deleteRecord(${rowIndex})"><i class="ti ti-trash"></i>刪除</button>
      <button class="btn" onclick="closeModal()">關閉</button>
      <button class="btn pri" onclick="closeModal();openEdit(${rowIndex})"><i class="ti ti-edit"></i>編輯</button>
    </div>
  `);
}

// ── Edit ───────────────────────────────────────────
function openEdit(rowIndex) {
  const raw=rowIndex!==null?records.find(r=>r._rowIndex===rowIndex):null;
  const v=raw?norm(raw):{id:'',name:'',phone:'',plan:'',ms:'🟢 開通中',ms2:'',me:'',room:'',locker:'',ls:'',le:'',lkst:'',key:'',note:''};
  const pd=s=>s?s.replace(/(\d{4})\/(\d{1,2})\/(\d{1,2})/,(m,y,mo,d)=>`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`):'' ;
  const ro=['男','女'].map(x=>`<option ${v.room===x?'selected':''}>${x}</option>`).join('');
  const ko=['已給會員','寄放櫃台','會員不拿','未記錄'].map(x=>`<option ${v.key===x?'selected':''}>${x}</option>`).join('');
  showModal(`
    <div class="modal-head">
      <h2>${raw?'編輯紀錄':'新增紀錄'}</h2>
      <button class="btn sml" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <div class="fr full"><label>會員編號</label><input id="e-id" value="${v.id}" placeholder="GE-100XXXMH"></div>
        <div class="fr"><label>姓名</label><input id="e-name" value="${v.name}"></div>
        <div class="fr"><label>電話</label><input id="e-phone" value="${v.phone}"></div>
        <div class="fr"><label>方案</label><input id="e-plan" value="${v.plan}" placeholder="個人/配偶/公司"></div>
        <div class="fr"><label>更衣室</label><select id="e-room"><option value="">— 未分配 —</option>${ro}</select></div>
        <div class="fr"><label>置物櫃號</label><input id="e-locker" value="${v.locker}"></div>
        <div class="fr"><label>鑰匙狀態</label><select id="e-key"><option value="">—</option>${ko}</select></div>
        <div class="fr"><label>置物起</label><input type="date" id="e-ls" value="${pd(v.ls)}"></div>
        <div class="fr"><label>置物迄</label><input type="date" id="e-le" value="${pd(v.le)}"></div>
        <div class="fr full"><label>備註</label><textarea id="e-note">${v.note}</textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn pri" id="save-btn" onclick="saveEdit(${rowIndex})"><i class="ti ti-device-floppy"></i>儲存到 Google Sheets</button>
    </div>
  `);
}

async function saveEdit(rowIndex) {
  const fmtD=s=>{if(!s)return '';const p=s.split('-');return `${p[0]}/${p[1]}/${p[2]}`;};
  const id=document.getElementById('e-id').value.trim();
  if(!id){alert('請輸入會員編號');return;}
  const leV=document.getElementById('e-le').value;
  let lkst='⚪ 未知';
  if(leV){const end=new Date(leV);end.setHours(0,0,0,0);const diff=Math.floor((end-TODAY)/86400000);if(diff<0)lkst='🔴 已過期';else if(diff<=30)lkst='🟡 即將到期';else lkst='🟢 有效';}
  const obj={id,name:document.getElementById('e-name').value.trim(),phone:document.getElementById('e-phone').value.trim(),plan:document.getElementById('e-plan').value.trim(),ms:'🟢 開通中',ms2:'',me:'',room:document.getElementById('e-room').value,locker:document.getElementById('e-locker').value.trim(),ls:fmtD(document.getElementById('e-ls').value),le:fmtD(leV),lkst,key:document.getElementById('e-key').value,note:document.getElementById('e-note').value.trim()};
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 儲存中...';
  try {
    await apiPost({action:rowIndex!==null?'update':'add',rowIndex,data:toSheet(obj)});
    closeModal();await loadData();
  } catch(e) {
    btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i>儲存到 Google Sheets';
    alert('儲存失敗：'+e.message);
  }
}

async function deleteRecord(rowIndex) {
  if(!confirm('確定要從 Google Sheets 刪除此筆紀錄？'))return;
  closeModal();
  try{await apiPost({action:'delete',rowIndex});await loadData();}
  catch(e){alert('刪除失敗：'+e.message);}
}

// ── Modal ──────────────────────────────────────────
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function closeModalBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ── Tab ────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['main','expire','waitlist','grid'][i]===t));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='expire')renderExpire();
  if(t==='waitlist')renderWaitlist();
  if(t==='grid')renderGrid();
}

// ── Export ─────────────────────────────────────────
function exportCSV(){
  const h=['會員編號','姓名','電話','方案','會籍狀態','會籍起','會籍迄','更衣室','置物櫃號','置物起','置物迄','置物狀態','鑰匙狀態','備註'];
  const rows=getFiltered().map(r=>[r.id,r.name,r.phone,r.plan,r.ms,r.ms2,r.me,r.room,r.locker,r.ls,r.le,r.lkst,r.key,(r.note||'').replace(/,/g,'；')]);
  dlCSV([h,...rows],'置物櫃主表_'+fmtT());
}
function exportExpireCSV(){
  const h=['會員編號','姓名','電話','更衣室','櫃號','到期日','過期天數','鑰匙','備註'];
  const rows=records.map(norm).filter(r=>r.lkst.includes('過期')).map(r=>[r.id,r.name,r.phone,r.room,r.locker,r.le,daysDiff(r.le)||'',r.key,(r.note||'').replace(/,/g,'；')]);
  dlCSV([h,...rows],'過期名單_'+fmtT());
}
function dlCSV(rows,name){const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=name+'.csv';a.click();}
function fmtT(){return TODAY.toISOString().slice(0,10);}
</script>
</body>
</html>
